syntax = "proto3";

package treemindmap.graph.v1;

option go_package = "treemindmap/api/proto;graphpb";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// Node defines the serialized graph vertex exchanged between services and BFF layers.
message Node {
  // id stores the UUID string that uniquely identifies the node across storage shards and services.
  string id = 1;

  // type classifies the node so consumers can apply domain-specific rendering and behavior.
  string type = 2;

  // content carries the primary summary text or excerpt displayed for the node.
  string content = 3;

  // properties stores extensible JSON-style data such as coordinates, visual style, and extra business attributes.
  google.protobuf.Struct properties = 4;

  // created_at is the audit timestamp for the first successful persistence of the node.
  google.protobuf.Timestamp created_at = 5;

  // updated_at is the audit timestamp for the latest successful mutation of the node.
  google.protobuf.Timestamp updated_at = 6;

  // deleted_at is set when the node is soft-deleted and remains unset while the node is active.
  google.protobuf.Timestamp deleted_at = 7;
}

// Edge defines the serialized directed relation exchanged between services and BFF layers.
message Edge {
  // id stores the UUID string that uniquely identifies the edge across storage shards and services.
  string id = 1;

  // source_id identifies the source node used when traversing outgoing relations.
  string source_id = 2;

  // target_id identifies the target node used when traversing incoming relations.
  string target_id = 3;

  // relation_type labels the semantic meaning of the connection for filtering and client rendering.
  string relation_type = 4;

  // weight stores an integer coefficient reserved for future layout and traversal strategies.
  int32 weight = 5;

  // properties stores extensible JSON-style data such as line style, arrow configuration, and extra business attributes.
  google.protobuf.Struct properties = 6;

  // created_at is the audit timestamp for the first successful persistence of the edge.
  google.protobuf.Timestamp created_at = 7;

  // updated_at is the audit timestamp for the latest successful mutation of the edge.
  google.protobuf.Timestamp updated_at = 8;

  // deleted_at is set when the edge is soft-deleted and remains unset while the edge is active.
  google.protobuf.Timestamp deleted_at = 9;
}

